name: Test ensyu14

on: [push]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. コードの取得
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. コンパイル
      - name: Compile
        run: |
          gcc -fprofile-arcs -ftest-coverage -c func14.c
          gcc -fprofile-arcs -ftest-coverage -c main14.c
          gcc -fprofile-arcs -ftest-coverage -o main_test main14.c func14.c

      # 3. 実行
      - name: Run Executable
        run: ./main_test

      # 4. カバレッジレポートの生成
      - name: Generate Coverage Report
        run: |
          gcov func14.o

      # 5. 実行ファイルとカバレッジ結果を保存
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-results-v14
          path: |
            main_test
            func14.c.gcov